name: 记忆提交
description: 提交一条公开资料档案
title: "[记忆提交] "
body:

  - type: input
    id: date
    attributes:
      label: 日期
      description: 事件日期或记录日期
      placeholder: 2026-07-11
    validations:
      required: true


  - type: input
    id: title
    attributes:
      label: 原文标题
      description: 请填写文章或事件原始标题
      placeholder: 王学典《XXXX》
    validations:
      required: true


  - type: input
    id: source
    attributes:
      label: 原文链接
      description: 原始来源网址
      placeholder: https://
    validations:
      required: true


  - type: input
    id: archive
    attributes:
      label: 第三方存档
      description: 优先填 Wayback Machine；微信文章请用 archive.ph
      placeholder: https://web.archive.org/web/... 或 https://archive.ph/
    validations:
      required: true


  - type: input
    id: parent
    attributes:
      label: 归属事件
      description: 若为后续报道，填写源头文章的 Issue 编号（如 4）；独立事件留空
      placeholder: 4


  - type: input
    id: figure
    attributes:
      label: 主旨人物
      description: 根事件的争议人物姓名；后续报道可留空
      placeholder: 王学典


  - type: textarea
    id: description
    attributes:
      label: 说明
      description: 简要说明事件背景、讨论情况等
      placeholder: 请填写说明
