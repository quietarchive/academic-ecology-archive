<!DOCTYPE html>
<html lang="zh-CN">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学术生态·404档案 · Academic Ecology Archive</title>

<style>
:root {
    color-scheme: dark;
    --bg: #0c182a;
    --text: #f3ecd9;
    --muted: #c9a46a;
    --line: rgba(240, 168, 74, 0.36);
    --accent: #f0a84a;
    --accent-soft: rgba(240, 168, 74, 0.16);
    --accent-strong: #ffc56d;
    --font: "PingFang SC", "PingFangSC-Semibold", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
}

* {
    box-sizing: border-box;
}

body {
    min-height: 100vh;
    max-width: 920px;
    margin: 0 auto;
    padding: 52px 48px 80px;
    color: var(--text);
    background:
        radial-gradient(circle at 14% 12%, rgba(240, 168, 74, 0.16), transparent 26%),
        radial-gradient(circle at 88% 4%, rgba(240, 168, 74, 0.10), transparent 28%),
        linear-gradient(rgba(240, 168, 74, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240, 168, 74, 0.025) 1px, transparent 1px),
        var(--bg);
    background-size: auto, auto, 40px 40px, 40px 40px, auto;
    font-family: var(--font);
    font-weight: 600;
    line-height: 1.75;
}

button,
input,
textarea,
h1,
h2,
.date,
.year {
    font-family: var(--font);
    font-weight: 600;
}

button {
    color: inherit;
}

h1 {
    margin: 0;
    font-size: clamp(32px, 4vw, 56px);
    line-height: 1;
    letter-spacing: 0;
}

h2 {
    margin: 0;
    font-size: clamp(17px, 1.9vw, 22px);
    line-height: 1.45;
    letter-spacing: 0;
}

p {
    margin: 18px 0 0;
    color: rgba(243, 236, 217, 0.82);
    font-size: 17px;
}

a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    border-bottom: 1px solid rgba(240, 168, 74, 0.42);
    transition: color 160ms ease, border-color 160ms ease;
}

a:hover {
    color: var(--accent-strong);
    border-color: var(--accent-strong);
}

.subtitle {
    max-width: 620px;
    margin: 18px 0 0;
    color: var(--muted);
    font-size: 17px;
    letter-spacing: 0;
}

.site-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 32px;
    margin-bottom: 58px;
}

.add-memory-button,
.submit-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    padding: 10px 18px;
    border: 1px solid rgba(240, 168, 74, 0.62);
    border-radius: 6px;
    background: rgba(240, 168, 74, 0.12);
    color: var(--accent);
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease, transform 160ms ease;
}

.add-memory-button:hover,
.submit-button:hover {
    border-color: var(--accent-strong);
    background: rgba(240, 168, 74, 0.22);
}

.add-memory-button:active,
.submit-button:active {
    transform: translateY(1px);
}

.button-icon {
    margin-right: 8px;
    font-size: 24px;
    line-height: 1;
    font-weight: 400;
}

.archive {
    position: relative;
}

.entry {
    position: relative;
    display: grid;
    grid-template-columns: 168px minmax(0, 1fr);
    gap: 28px;
    margin-bottom: 56px;
}

.entry::before {
    content: "";
    position: absolute;
    left: 12px;
    top: 50px;
    bottom: -70px;
    width: 4px;
    background: linear-gradient(var(--line), rgba(240, 168, 74, 0.10));
}

.entry::after {
    content: "";
    position: absolute;
    left: 3px;
    top: 36px;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow:
        0 0 0 10px rgba(240, 168, 74, 0.08),
        0 0 28px rgba(240, 168, 74, 0.55);
}

.entry.entry-continued::before {
    top: 18px;
}

.entry.entry-continued::after {
    top: 8px;
}

.time-col {
    position: relative;
    min-height: 110px;
    padding-left: 52px;
}

.year {
    margin: 0 0 18px 0;
    color: rgba(240, 168, 74, 0.72);
    font-size: clamp(28px, 3.2vw, 36px);
    line-height: 1;
    letter-spacing: 0;
}

.date {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 96px;
    min-height: 38px;
    padding: 7px 12px;
    border: 1px solid rgba(240, 168, 74, 0.62);
    border-radius: 12px;
    color: var(--accent);
    background: rgba(20, 29, 49, 0.72);
    box-shadow:
        0 14px 28px rgba(240, 168, 74, 0.14),
        inset 0 -4px 0 rgba(240, 168, 74, 0.08),
        0 4px 0 rgba(4, 9, 18, 0.24);
    font-size: clamp(14px, 1.5vw, 16px);
    line-height: 1;
    letter-spacing: 0;
}

.content {
    max-width: 640px;
    padding-top: 54px;
}

.entry.entry-continued .content {
    padding-top: 4px;
}

.entry.entry-continued .time-col {
    min-height: 48px;
    padding-top: 4px;
}

.entry-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 18px;
}

.discussion-button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    padding: 6px 14px;
    border: 1px solid rgba(240, 168, 74, 0.55);
    border-radius: 6px;
    color: var(--accent);
    background: rgba(240, 168, 74, 0.10);
    font-size: 14px;
    cursor: pointer;
    transition: background 160ms ease, border-color 160ms ease;
}

.discussion-button:hover {
    border-color: var(--accent-strong);
    background: rgba(240, 168, 74, 0.20);
}

.discussion-dialog {
    width: min(760px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    padding: 0;
    border: 1px solid rgba(240, 168, 74, 0.34);
    border-radius: 8px;
    color: var(--text);
    background: #111f34;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
}

.discussion-dialog::backdrop {
    background: rgba(3, 8, 16, 0.76);
    backdrop-filter: blur(5px);
}

.discussion-panel {
    display: flex;
    flex-direction: column;
    max-height: calc(100vh - 32px);
}

.discussion-panel .dialog-header {
    margin: 0;
    padding: 20px 22px 14px;
    border-bottom: 1px solid rgba(240, 168, 74, 0.18);
}

.discussion-gallery {
    display: grid;
    gap: 16px;
    padding: 18px 22px 24px;
    overflow: auto;
}

.discussion-gallery figure {
    margin: 0;
}

.discussion-gallery img {
    display: block;
    width: 100%;
    height: auto;
    border: 1px solid rgba(240, 168, 74, 0.28);
    border-radius: 6px;
    background: #0a1422;
}

.memory-dialog {
    width: min(620px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    padding: 0;
    border: 1px solid rgba(240, 168, 74, 0.34);
    border-radius: 8px;
    color: var(--text);
    background: #111f34;
    box-shadow: 0 28px 80px rgba(0, 0, 0, 0.55);
}

.memory-dialog::backdrop {
    background: rgba(3, 8, 16, 0.76);
    backdrop-filter: blur(5px);
}

.memory-form {
    padding: 26px;
}

.dialog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 22px;
}

.dialog-header h2 {
    font-size: 24px;
    line-height: 1.3;
}

.close-button {
    display: grid;
    flex: 0 0 38px;
    width: 38px;
    height: 38px;
    place-items: center;
    padding: 0;
    border: 0;
    border-radius: 50%;
    color: var(--muted);
    background: transparent;
    font-size: 28px;
    line-height: 1;
    cursor: pointer;
}

.close-button:hover {
    color: var(--text);
    background: rgba(240, 168, 74, 0.12);
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
}

.field {
    display: grid;
    gap: 7px;
}

.field-wide {
    grid-column: 1 / -1;
}

.field label {
    color: rgba(243, 236, 217, 0.82);
    font-size: 14px;
    font-weight: 700;
}

.field input,
.field textarea {
    width: 100%;
    border: 1px solid rgba(240, 168, 74, 0.30);
    border-radius: 6px;
    outline: 0;
    color: var(--text);
    background: rgba(6, 14, 26, 0.62);
    transition: border-color 160ms ease, box-shadow 160ms ease;
}

.field input {
    height: 46px;
    padding: 0 13px;
}

.field textarea {
    min-height: 100px;
    padding: 11px 13px;
    resize: vertical;
}

.field input:focus,
.field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(240, 168, 74, 0.14);
}

.archive-tools {
    display: grid;
    gap: 10px;
}

.archive-actions {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}

.archive-button {
    flex: 1 1 auto;
    min-height: 46px;
    padding: 0 15px;
    border: 1px solid rgba(240, 168, 74, 0.42);
    border-radius: 6px;
    color: var(--accent);
    background: rgba(240, 168, 74, 0.10);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 160ms ease, background 160ms ease;
}

.archive-button:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(240, 168, 74, 0.16);
}

.archive-button:disabled {
    opacity: 0.42;
    cursor: not-allowed;
}

.field-hint {
    margin: 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
}

.form-actions {
    display: flex;
    justify-content: flex-end;
    margin-top: 22px;
}

.title-tools {
    display: flex;
    gap: 10px;
    align-items: stretch;
}

.title-tools input {
    flex: 1 1 auto;
}

.fetch-title-button {
    flex: 0 0 auto;
    min-height: 46px;
    padding: 0 15px;
    border: 1px solid rgba(240, 168, 74, 0.42);
    border-radius: 6px;
    color: var(--accent);
    background: rgba(240, 168, 74, 0.10);
    font-size: 14px;
    cursor: pointer;
    transition: border-color 160ms ease, background 160ms ease;
}

.fetch-title-button:hover:not(:disabled) {
    border-color: var(--accent);
    background: rgba(240, 168, 74, 0.16);
}

.fetch-title-button:disabled {
    opacity: 0.42;
    cursor: not-allowed;
}

.archive-status,
.title-status {
    margin: 8px 0 0;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
    min-height: 1.55em;
}

.archive-empty,
.archive-loading,
.archive-error {
    padding: 48px 0 20px;
    color: var(--muted);
    font-size: 16px;
}

.submit-button {
    color: #1a1208;
    background: var(--accent);
}

.submit-button:hover {
    background: var(--accent-strong);
}

@media (max-width: 780px) {
    body {
        padding: 34px 20px 60px;
    }

    .subtitle {
        margin-bottom: 0;
    }

    .site-header {
        align-items: flex-start;
        flex-direction: column;
        margin-bottom: 34px;
    }

    .entry {
        grid-template-columns: 1fr;
        gap: 22px;
        margin-bottom: 48px;
    }

    .entry::before {
        left: 10px;
        top: 72px;
    }

    .entry::after {
        top: 58px;
    }

    .entry.entry-continued::before {
        top: 28px;
    }

    .entry.entry-continued::after {
        top: 14px;
    }

    .time-col {
        padding-left: 42px;
    }

    .year {
        margin-bottom: 14px;
        font-size: 28px;
    }

    .date {
        min-width: 96px;
        min-height: 36px;
        font-size: 15px;
        border-radius: 12px;
    }

    .content {
        max-width: none;
        padding: 0 0 0 42px;
    }

    .entry.entry-continued .content {
        padding: 0 0 0 42px;
    }

    .memory-form {
        padding: 20px;
    }

    .form-grid {
        grid-template-columns: 1fr;
    }

    .archive-tools {
        align-items: stretch;
    }

    .archive-actions {
        flex-direction: column;
    }
}
</style>
</head>

<body>
<header class="site-header">
    <div>
        <h1>学术生态·404档案</h1>

        <p class="subtitle">
        Academic Ecology Archive<br>
        互联网没有记忆，所以我们替它记。
        </p>
    </div>

    <button class="add-memory-button" id="openMemoryForm" type="button">
        <span class="button-icon" aria-hidden="true">+</span>
        添加记忆
    </button>
</header>

<main class="archive" id="archive" aria-live="polite">
    <p class="archive-loading">正在加载档案…</p>
</main>

<dialog class="discussion-dialog" id="discussionDialog">
    <div class="discussion-panel">
        <div class="dialog-header">
            <h2 id="discussionTitle">讨论截图</h2>
            <button class="close-button" id="closeDiscussion" type="button" aria-label="关闭">&times;</button>
        </div>
        <div class="discussion-gallery" id="discussionGallery"></div>
    </div>
</dialog>

<dialog class="memory-dialog" id="memoryDialog">
    <form class="memory-form" id="memoryForm">
        <div class="dialog-header">
            <h2>添加一条记忆</h2>
            <button class="close-button" id="closeMemoryForm" type="button" aria-label="关闭">&times;</button>
        </div>

        <div class="form-grid">
            <div class="field field-wide">
                <label for="sourceUrl">来源链接</label>
                <div class="archive-tools">
                    <input id="sourceUrl" name="source" type="url" inputmode="url" placeholder="https://" required>
                    <div class="archive-actions">
                        <button class="archive-button" id="createArchiveWayback" type="button" disabled>Wayback 存档</button>
                        <button class="archive-button" id="createArchivePh" type="button" disabled>archive.ph 存档</button>
                    </div>
                </div>
                <p class="field-hint" id="archiveHint">优先用互联网档案馆（Wayback）；微信文章常被拦截，请改用 archive.ph。保存后把可用的永久链接粘贴到下方。</p>
            </div>

            <div class="field field-wide">
                <label for="memoryTitle">事件标题</label>
                <div class="title-tools">
                    <input id="memoryTitle" name="title" type="text" maxlength="120" required>
                    <button class="fetch-title-button" id="fetchTitle" type="button" disabled>获取标题</button>
                </div>
                <p class="title-status" id="titleStatus" aria-live="polite"></p>
            </div>

            <div class="field">
                <label for="memoryDate">事件日期</label>
                <input id="memoryDate" name="date" type="date" required>
            </div>

            <div class="field field-wide">
                <label for="archiveUrl">第三方存档链接</label>
                <input id="archiveUrl" name="archive" type="url" inputmode="url" placeholder="https://web.archive.org/web/... 或 https://archive.ph/..." required>
            </div>

            <div class="field field-wide">
                <label for="memoryNote">补充说明（选填）</label>
                <textarea id="memoryNote" name="note" maxlength="1000"></textarea>
            </div>
        </div>

        <div class="form-actions">
            <button class="submit-button" type="submit">提交到 GitHub</button>
        </div>
    </form>
</dialog>

<script>
const repository = "quietarchive/academic-ecology-archive";
const archiveRoot = document.getElementById("archive");
const dialog = document.getElementById("memoryDialog");
const discussionDialog = document.getElementById("discussionDialog");
const discussionTitle = document.getElementById("discussionTitle");
const discussionGallery = document.getElementById("discussionGallery");
const form = document.getElementById("memoryForm");
const dateInput = document.getElementById("memoryDate");
const sourceInput = document.getElementById("sourceUrl");
const titleInput = document.getElementById("memoryTitle");
const titleStatus = document.getElementById("titleStatus");
const createArchiveWaybackButton = document.getElementById("createArchiveWayback");
const createArchivePhButton = document.getElementById("createArchivePh");
const archiveHint = document.getElementById("archiveHint");
const fetchTitleButton = document.getElementById("fetchTitle");

const defaultArchiveHint = "优先用互联网档案馆（Wayback）；微信文章常被拦截，请改用 archive.ph。保存后把可用的永久链接粘贴到下方。";
const wechatArchiveHint = "检测到微信链接：Wayback 通常只能存到验证页。请优先用 archive.ph 存档，再把永久链接粘贴到下方。";

let titleFetchToken = 0;
let entriesById = new Map();

function escapeHtml(value) {
    return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
}

function formatDateParts(isoDate) {
    const [year, month, day] = isoDate.split("-").map(Number);
    return {
        year: String(year),
        date: `${month}月${day}日`
    };
}

function entryKey(entry, index) {
    return entry.issue != null ? `issue-${entry.issue}` : `entry-${index}`;
}

function extractImageUrls(markdownOrHtml) {
    const urls = [];
    const patterns = [
        /!\[[^\]]*\]\((https?:\/\/[^)\s]+)\)/g,
        /<img[^>]+src=["'](https?:\/\/[^"']+)["']/gi
    ];

    for (const pattern of patterns) {
        for (const match of markdownOrHtml.matchAll(pattern)) {
            urls.push(match[1]);
        }
    }

    return [...new Set(urls)];
}

function toImageSrc(pathOrUrl) {
    if (/^https?:\/\//i.test(pathOrUrl)) {
        return pathOrUrl;
    }
    return `./${pathOrUrl.replace(/^\.\//, "")}`;
}

async function resolveDiscussionImages(entry) {
    const local = Array.isArray(entry.discussion) ? entry.discussion.filter(Boolean) : [];

    if (entry.issue != null) {
        const response = await fetch(
            `https://api.github.com/repos/${repository}/issues/${entry.issue}/comments?per_page=100`
        );
        if (!response.ok) {
            if (local.length) return local;
            throw new Error(`GitHub API ${response.status}`);
        }

        const comments = await response.json();
        const remote = comments
            .filter((comment) => comment.user?.type !== "Bot")
            .flatMap((comment) => extractImageUrls(comment.body || ""));

        if (remote.length) return remote;
    }

    return local;
}

async function openDiscussion(entry) {
    discussionTitle.textContent = "讨论截图";
    discussionGallery.innerHTML = '<p class="archive-loading">正在加载截图…</p>';
    discussionDialog.showModal();

    try {
        const images = await resolveDiscussionImages(entry);
        if (!images.length) {
            discussionGallery.innerHTML = '<p class="archive-empty">这条记忆还没有讨论截图。在对应 GitHub Issue 下评论贴图后即可显示。</p>';
            return;
        }

        discussionGallery.innerHTML = images.map((src, index) => `
            <figure>
                <img src="${escapeHtml(toImageSrc(src))}" alt="讨论截图 ${index + 1}" loading="lazy">
            </figure>
        `).join("");
    } catch (error) {
        console.error(error);
        discussionGallery.innerHTML = '<p class="archive-error">截图加载失败，请稍后重试。</p>';
    }
}

function renderEntries(entries) {
    if (!entries.length) {
        archiveRoot.innerHTML = '<p class="archive-empty">暂无档案条目。</p>';
        return;
    }

    entriesById = new Map();
    let previousYear = "";
    archiveRoot.innerHTML = entries.map((entry, index) => {
        const key = entryKey(entry, index);
        entriesById.set(key, entry);
        const { year, date } = formatDateParts(entry.date);
        const showYear = year !== previousYear;
        previousYear = year;
        const note = entry.note
            ? `<p>备注：${escapeHtml(entry.note)}</p>`
            : "";
        const canOpenDiscussion = entry.issue != null
            || (Array.isArray(entry.discussion) && entry.discussion.length > 0);
        const discussionAction = canOpenDiscussion
            ? `<div class="entry-actions">
                    <button class="discussion-button" type="button" data-entry-key="${escapeHtml(key)}">讨论截图</button>
               </div>`
            : "";

        return `
            <article class="entry${showYear ? "" : " entry-continued"}">
                <div class="time-col">
                    ${showYear ? `<div class="year">${escapeHtml(year)}</div>` : ""}
                    <div class="date">${escapeHtml(date)}</div>
                </div>
                <div class="content">
                    <h2>${escapeHtml(entry.title)}</h2>
                    <p>
                        来源：
                        <a href="${escapeHtml(entry.source)}" rel="noopener noreferrer" target="_blank">${escapeHtml(entry.source)}</a>
                    </p>
                    <p>
                        第三方存档：
                        <a href="${escapeHtml(entry.archive)}" rel="noopener noreferrer" target="_blank">${escapeHtml(entry.archive)}</a>
                    </p>
                    ${note}
                    ${discussionAction}
                </div>
            </article>
        `;
    }).join("");
}

archiveRoot.addEventListener("click", (event) => {
    const button = event.target.closest(".discussion-button");
    if (!button) return;
    const entry = entriesById.get(button.dataset.entryKey);
    if (entry) openDiscussion(entry);
});

document.getElementById("closeDiscussion").addEventListener("click", () => {
    discussionDialog.close();
});

discussionDialog.addEventListener("click", (event) => {
    if (event.target === discussionDialog) {
        discussionDialog.close();
    }
});

async function loadEntries() {
    try {
        const response = await fetch(`./data/entries.json?t=${Date.now()}`);
        if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        const entries = Array.isArray(data.entries) ? data.entries : [];
        entries.sort((a, b) => {
            if (a.date === b.date) return (b.issue || 0) - (a.issue || 0);
            return a.date < b.date ? 1 : -1;
        });
        renderEntries(entries);
    } catch (error) {
        archiveRoot.innerHTML = '<p class="archive-error">档案加载失败，请稍后刷新。</p>';
        console.error(error);
    }
}

function isWechatUrl(url) {
    try {
        return /(^|\.)mp\.weixin\.qq\.com$/i.test(new URL(url).hostname);
    } catch {
        return false;
    }
}

function syncSourceButtons() {
    const valid = sourceInput.validity.valid && Boolean(sourceInput.value.trim());
    createArchiveWaybackButton.disabled = !valid;
    createArchivePhButton.disabled = !valid;
    fetchTitleButton.disabled = !valid;
    archiveHint.textContent = valid && isWechatUrl(sourceInput.value.trim())
        ? wechatArchiveHint
        : defaultArchiveHint;
}

function decodeHtmlEntities(text) {
    const textarea = document.createElement("textarea");
    textarea.innerHTML = text;
    return textarea.value.trim();
}

function cleanTitle(title) {
    return decodeHtmlEntities(title).replace(/\s+/g, " ").trim();
}

async function fetchTitleFromMicrolink(url) {
    const response = await fetch(`https://api.microlink.io/?url=${encodeURIComponent(url)}`);
    if (!response.ok) return "";
    const json = await response.json();
    return json?.status === "success" ? (json.data?.title || "") : "";
}

async function fetchTitleFromAllOrigins(url) {
    const response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`);
    if (!response.ok) return "";
    const html = await response.text();
    const og = html.match(/property=["']og:title["']\s+content=["']([^"']+)["']/i)
        || html.match(/content=["']([^"']+)["']\s+property=["']og:title["']/i);
    if (og?.[1]) return og[1];
    const title = html.match(/<title[^>]*>([^<]+)<\/title>/i);
    return title?.[1] || "";
}

async function resolvePageTitle(url) {
    const attempts = [fetchTitleFromMicrolink, fetchTitleFromAllOrigins];
    for (const attempt of attempts) {
        try {
            const title = cleanTitle(await attempt(url));
            if (title) return title;
        } catch (error) {
            console.warn(error);
        }
    }
    return "";
}

async function fillTitleFromSource({ force = false } = {}) {
    if (!sourceInput.validity.valid) return;
    if (!force && titleInput.value.trim()) return;

    const token = ++titleFetchToken;
    const url = sourceInput.value.trim();
    titleStatus.textContent = "正在获取标题…";
    fetchTitleButton.disabled = true;

    const title = await resolvePageTitle(url);
    if (token !== titleFetchToken) return;

    if (title) {
        titleInput.value = title.slice(0, 120);
        titleStatus.textContent = "已自动填入标题，可按需修改。";
    } else {
        titleStatus.textContent = "未能自动获取标题（微信文章较常见），请手动填写。";
    }

    syncSourceButtons();
}

document.getElementById("openMemoryForm").addEventListener("click", () => {
    if (!dateInput.value) {
        dateInput.value = new Date().toLocaleDateString("en-CA");
    }
    syncSourceButtons();
    titleStatus.textContent = "";
    dialog.showModal();
});

document.getElementById("closeMemoryForm").addEventListener("click", () => dialog.close());

sourceInput.addEventListener("input", () => {
    syncSourceButtons();
});

sourceInput.addEventListener("change", () => {
    fillTitleFromSource();
});

fetchTitleButton.addEventListener("click", () => {
    fillTitleFromSource({ force: true });
});

createArchiveWaybackButton.addEventListener("click", () => {
    if (!sourceInput.reportValidity()) {
        return;
    }

    const saveUrl = `https://web.archive.org/save/${sourceInput.value.trim()}`;
    window.open(saveUrl, "_blank", "noopener,noreferrer");
});

createArchivePhButton.addEventListener("click", () => {
    if (!sourceInput.reportValidity()) {
        return;
    }

    const saveUrl = `https://archive.ph/?run=1&url=${encodeURIComponent(sourceInput.value.trim())}`;
    window.open(saveUrl, "_blank", "noopener,noreferrer");
});

dialog.addEventListener("click", (event) => {
    if (event.target === dialog) {
        dialog.close();
    }
});

form.addEventListener("submit", (event) => {
    event.preventDefault();

    const data = new FormData(form);
    const title = data.get("title").trim();
    const date = data.get("date");
    const source = data.get("source").trim();
    const archive = data.get("archive").trim();
    const note = data.get("note").trim() || "无";
    const issueTitle = `[记忆提交] ${date} ${title}`;
    const issueBody = [
        "## 事件信息",
        "",
        `- 日期：${date}`,
        `- 标题：${title}`,
        `- 来源链接：${source}`,
        `- 第三方存档：${archive}`,
        "",
        "## 补充说明",
        "",
        note
    ].join("\n");
    const issueUrl = new URL(`https://github.com/${repository}/issues/new`);

    issueUrl.searchParams.set("title", issueTitle);
    issueUrl.searchParams.set("body", issueBody);
    window.open(issueUrl.toString(), "_blank", "noopener,noreferrer");
    dialog.close();
});

loadEntries();
</script>
